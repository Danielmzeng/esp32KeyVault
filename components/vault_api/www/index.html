/* Mirror the server's idle auto-lock on the client so the page returns to the
 * unlock screen on its own. Re-armed by every successful API call -- the same
 * activity that refreshes the server timer -- so the two stay in step. The +5s
 * grace makes the timer fire just AFTER the server would lock, so the boot()/state
 * recheck sees an expired session (a recheck before the server threshold would
 * instead refresh it and extend the session). The timeout itself comes from the
 * server (/api/state idle_ms) so the two can't silently drift; the literal is
 * only a fallback for the first arm before state is fetched. */
let idleTimer;
let idleMs = 3*60*1000;            /* updated from the server's idle_ms in boot() */
function armIdle(){ clearTimeout(idleTimer); idleTimer = setTimeout(boot, idleMs + 5000); }
function stopIdle(){ clearTimeout(idleTimer); }

async function api(path, opts={}) {
  const r = await fetch(path, {credentials:'same-origin', headers:{'Content-Type':'application/json'}, ...opts});
  if (!r.ok) {
    if (r.status === 401) { stopIdle(); boot(); }   /* session locked/expired: back to unlock */
    throw new Error((await r.json().catch(()=>({}))).error || r.statusText);
  }
  armIdle();
  return r.status === 204 ? null : r.json();
}
async function boot() {
  const st = await api('/api/state');
  if (st.idle_ms > 0) idleMs = st.idle_ms;   /* track the server's auto-lock window */
  if (!st.initialized) return renderSetup();
  if (!st.unlocked) return renderLogin();
  return renderVault();
}
function renderSetup() {
  stopIdle();
  $('#app').innerHTML = `<img class=logo src="${LOGO}" alt="esp32key">
    <h2>Set up vault</h2>
    <input id=pw type=password placeholder="Master password (daily unlock)">
    <input id=tpw type=password placeholder="Transfer password (import/export)">
    <button id=go>Create vault</button><div class=err id=e></div>`;
  $('#go').onclick = async () => {
    try { await api('/api/setup',{method:'POST',body:JSON.stringify(
      {password:$('#pw').value, transfer_password:$('#tpw').value})}); boot(); }
    catch(e){ $('#e').textContent = e.message; }
  };
}
function renderLogin() {
  stopIdle();
  $('#app').innerHTML = `<img class=logo src="${LOGO}" alt="esp32key">
    <h2>Unlock</h2>
    <input id=pw type=password placeholder="Master password">
    <button id=go>Unlock</button><div class=err id=e></div>`;
  const submit = async () => {
    try { await api('/api/login',{method:'POST',body:JSON.stringify({password:$('#pw').value})}); boot(); }
    catch(e){ $('#e').textContent = e.message; }
  };
  $('#go').onclick = submit;
  $('#pw').onkeydown = e => { if (e.key === 'Enter') submit(); };
}

/* ---- vault with category sidebar ---- */
let cats = [], entries = [], sel = 'all';
const catName = id => id === 0 ? 'Uncategorized' : (cats.find(c=>c.id===id)?.name ?? 'Uncategorized');

async function renderVault() {
  entries = (await api('/api/entries')).entries || [];
  cats    = (await api('/api/categories')).categories || [];
  paint();
}

function paint() {
  const sideItems = [{k:'all',n:'All'},{k:0,n:'Uncategorized'},
                     ...cats.map(c=>({k:c.id,n:c.name,del:true}))];
  const side = sideItems.map(it=>`<div class="cat${sel===it.k?' on':''}" data-k="${it.k}">
      <span class=cn>${esc(it.n)}</span>${it.del?`<span class=x data-del="${it.k}">×</span>`:''}</div>`).join('');

  const shown = entries.filter(e => sel==='all' ? true : e.category===sel);
  const list = shown.map(e=>`<div class=entry data-id=${e.id}>
      <b>${esc(e.title)}</b> — ${esc(e.username)} <small>[${esc(catName(e.category))}]</small>
      <div class=row><button class=rev>Reveal</button><button class=edit>Edit</button><button class=del>Delete</button></div>
      <div class=sec></div></div>`).join('') || '<p>No entries.</p>';

  const opts = [`<option value=0>Uncategorized</option>`,
                ...cats.map(c=>`<option value=${c.id}>${esc(c.name)}</option>`)].join('');

  $('#app').innerHTML = `<div class=layout>
    <div class=side>
      <img class=logo id=logolock src="${LOGO}" alt="esp32key" title="Lock" style="cursor:pointer">
      <div id=catlist>${side}</div>
      <div class=addcat><input id=newcat placeholder="New category" maxlength=31>
        <button id=addcat>+ Add</button></div>
      <div class=err id=ce></div>
      <div class=row style="margin-top:.6rem"><button id=xfer>Transfer Entries</button>
        <button id=lock>Lock</button></div>
      <div class=row style="margin-top:.4rem"><button id=clear>Clear Entries</button>
        <button id=reset>Reset Device</button></div>
      <div style="margin-top:.6rem">
        <label for=idlesec style="display:block;font-size:.8rem;font-weight:600;color:#555">Auto-lock after (seconds)</label>
        <input id=idlesec type=number min=30 max=3600 step=10>
        <button id=idlesave>Save timeout</button>
        <div class=warn id=idlemsg></div>
      </div>
    </div>
    <div class=main>
      <h2>${sel==='all'?'All entries':esc(catName(sel))}</h2>
      <div id=list>${list}</div>
      <h3>Add entry</h3>
      <select id=ecat>${opts}</select>
      <input id=t placeholder=Title><input id=u placeholder=Username>
      <input id=eurl placeholder=URL>
      <input id=s placeholder=Secret autocomplete="off" data-lpignore="true" data-1p-ignore data-form-type="other">
      <input id=ecmt placeholder=Comment>
      <button id=add>Add</button><div class=err id=e></div>
    </div></div>`;

  if (sel!=='all') $('#ecat').value = String(sel);

  document.querySelectorAll('.cat').forEach(c=>c.onclick=ev=>{
    if (ev.target.classList.contains('x')) return;       /* handled below */
    const k = c.dataset.k; sel = k==='all' ? 'all' : Number(k); paint();
  });
  document.querySelectorAll('.cat .x').forEach(x=>x.onclick=async ev=>{
    ev.stopPropagation();
    if (!confirm('Delete this category? Its entries move to Uncategorized.')) return;
    try { await api(`/api/categories/${x.dataset.del}`,{method:'DELETE'});
      if (sel===Number(x.dataset.del)) sel='all'; renderVault(); }
    catch(e){ $('#ce').textContent = e.message; }
  });
  $('#addcat').onclick = async () => {
    const name = $('#newcat').value.trim();
    if (!name) return;
    try { await api('/api/categories',{method:'POST',body:JSON.stringify({name})}); renderVault(); }
    catch(e){ $('#ce').textContent = e.message; }
  };
  $('#idlesec').value = Math.round(idleMs / 1000);
  $('#idlesave').onclick = async () => {
    const secs = Number($('#idlesec').value);
    const msg = $('#idlemsg');
    if (!Number.isInteger(secs) || secs < 30 || secs > 3600) {
      msg.style.color = '#b00'; msg.textContent = 'Enter 30–3600 seconds.'; return;
    }
    try {
      await api('/api/idle', {method:'POST', body:JSON.stringify({seconds:secs})});
      idleMs = secs * 1000;          // update the client mirror of the auto-lock window
      armIdle();                      // re-arm with the new window
      msg.style.color = '#070'; msg.textContent = 'Saved.';
    } catch (e) { msg.style.color = '#b00'; msg.textContent = e.message; }
  };
  document.querySelectorAll('.rev').forEach(b=>b.onclick=async ev=>{
    const btn=ev.target, d=btn.closest('.entry'), sec=d.querySelector('.sec');
    if (btn.textContent==='Hide'){ sec.innerHTML=''; btn.textContent='Reveal'; return; }
    try { const {secret,url,comment}=await api(`/api/entries/${d.dataset.id}/secret`);
      const e2 = entries.find(x=>String(x.id)===d.dataset.id) || {};
      sec.innerHTML =
        `<div><b>URL:</b> ${esc(url)||'—'}</div>`+
        `<div><b>Username:</b> ${esc(e2.username)||'—'}</div>`+
        `<div><b>Secret:</b> ${esc(secret)||'—'}</div>`+
        `<div><b>Comment:</b> ${esc(comment)||'—'}</div>`;
      btn.textContent='Hide'; }
    catch(e){ sec.textContent = e.message; }
  });
  document.querySelectorAll('.edit').forEach(b=>b.onclick=async ev=>{
    const d=ev.target.closest('.entry'), box=d.querySelector('.sec'), id=d.dataset.id;
    d.querySelector('.rev').textContent='Reveal';      /* drop any open reveal */
    if (box.dataset.mode==='edit'){ box.innerHTML=''; box.dataset.mode=''; return; }
    const e = entries.find(x=>String(x.id)===id) || {};
    /* Must load the hidden fields first; opening the form with blanks would let a
     * Save overwrite the stored secret/url/comment with empty strings. */
    let cur;
    try { cur = await api(`/api/entries/${id}/secret`); }
    catch(err){ box.textContent = 'Could not load entry: ' + err.message; return; }
    box.dataset.mode='edit';
    box.innerHTML =
      `<label>Title</label><input class=et value="${esc(e.title)}" placeholder=Title>`+
      `<label>Username</label><input class=eu value="${esc(e.username)}" placeholder=Username>`+
      `<label>URL</label><input class=eurl value="${esc(cur.url)}" placeholder=URL>`+
      `<label>Secret</label><input class=es value="${esc(cur.secret)}" placeholder=Secret autocomplete="off" data-lpignore="true" data-1p-ignore data-form-type="other">`+
      `<label>Comment</label><input class=ecmt value="${esc(cur.comment)}" placeholder=Comment>`+
      `<label>Category</label><select class=ecat>${opts}</select>`+
      `<div class=row><button class=save>Save</button><button class=cancel>Cancel</button></div>`+
      `<div class=err></div>`;
    box.querySelector('.ecat').value = String(e.category);
    box.querySelector('.cancel').onclick = ()=>{ box.innerHTML=''; box.dataset.mode=''; };
    box.querySelector('.save').onclick = async ()=>{
      try { await api(`/api/entries/${id}`,{method:'PUT',body:JSON.stringify(
        {title:box.querySelector('.et').value, username:box.querySelector('.eu').value,
         secret:box.querySelector('.es').value, url:box.querySelector('.eurl').value,
         comment:box.querySelector('.ecmt').value, category:Number(box.querySelector('.ecat').value)})});
        renderVault(); }
      catch(err){ box.querySelector('.err').textContent = err.message; }
    };
  });
  document.querySelectorAll('.del').forEach(b=>b.onclick=async ev=>{
    const d=ev.target.closest('.entry'); await api(`/api/entries/${d.dataset.id}`,{method:'DELETE'}); renderVault();
  });
  $('#add').onclick = async () => {
    try { await api('/api/entries',{method:'POST',body:JSON.stringify(
      {title:$('#t').value, username:$('#u').value, secret:$('#s').value,
       url:$('#eurl').value, comment:$('#ecmt').value, category:Number($('#ecat').value)})});
      renderVault(); }
    catch(e){ $('#e').textContent = e.message; }
  };
  $('#xfer').onclick = renderTransfer;
  $('#clear').onclick = renderClear;
  $('#reset').onclick = renderReset;
  const lock = async()=>{ try{ await api('/api/logout',{method:'POST'}); }catch(e){} boot(); };
  $('#lock').onclick = lock;
  $('#logolock').onclick = lock;   /* clicking the sidebar logo also locks */
}

function renderClear() {
  $('#app').innerHTML = `<img class=logo src="${LOGO}" alt="esp32key">
    <h2>Clear entries</h2>
    <p class=warn>This permanently deletes <b>all entries</b>. Categories and your passwords are kept. This cannot be undone.</p>
    <input id=rpw type=password placeholder="Transfer password">
    <button id=go>Delete all entries</button>
    <div class=row><button id=back>Back</button></div>
    <div class=err id=e></div>`;
  $('#back').onclick = renderVault;
  $('#go').onclick = async () => {
    if (!confirm('Delete ALL entries? This cannot be undone.')) return;
    try { await api('/api/reset',{method:'POST',body:JSON.stringify({transfer_password:$('#rpw').value})});
      sel = 'all'; renderVault(); }
    catch(e){ $('#e').textContent = e.message; }
  };
}

function renderReset() {
  $('#app').innerHTML = `<img class=logo src="${LOGO}" alt="esp32key">
    <h2>Reset keys</h2>
    <h3>Change master password</h3>
    <input id=mc type=password placeholder="Current master password">
    <input id=mn type=password placeholder="New master password">
    <button id=gom>Change master password</button>
    <div class=err id=me></div>
    <h3>Change transfer password</h3>
    <input id=tc type=password placeholder="Current transfer password">
    <input id=tn type=password placeholder="New transfer password">
    <button id=got>Change transfer password</button>
    <div class=err id=te></div>
    <div class=row style="margin-top:.6rem"><button id=back>Back</button></div>`;
  $('#back').onclick = renderVault;
  const rotate = async (path, curEl, newEl, msgEl) => {
    try {
      await api(path,{method:'POST',body:JSON.stringify({current:$(curEl).value, next:$(newEl).value})});
      $(msgEl).style.color = '#070'; $(msgEl).textContent = 'Changed.';
      $(curEl).value = $(newEl).value = '';
    } catch(e){ $(msgEl).style.color = '#b00'; $(msgEl).textContent = e.message; }
  };
  $('#gom').onclick = () => rotate('/api/change-password','#mc','#mn','#me');
  $('#got').onclick = () => rotate('/api/change-transfer','#tc','#tn','#te');
}

function renderTransfer() {
  $('#app').innerHTML = `<img class=logo src="${LOGO}" alt="esp32key">
    <h2>Transfer</h2>
    <h3>Export</h3>
    <p class=warn>Warning: the export file is plaintext — every password is readable. Store it somewhere safe and delete it when done.</p>
    <input id=epw type=password placeholder="Transfer password">
    <button id=exp>Download export file</button>
    <h3>Import</h3>
    <input id=file type=file accept="application/json,.json">
    <button id=imp>Import file</button>
    <div class=row><button id=back>Back</button></div>
    <div class=err id=e></div>`;
  $('#back').onclick = renderVault;
  $('#exp').onclick = async () => {
    try {
      const r = await fetch('/api/export', {method:'POST', credentials:'same-origin',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({transfer_password:$('#epw').value})});
      if (!r.ok) throw new Error((await r.json().catch(()=>({}))).error || r.statusText);
      const blob = await r.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = 'esp32key-export.json'; a.click();
      URL.revokeObjectURL(a.href);
    } catch(e){ $('#e').textContent = e.message; }
  };
  $('#imp').onclick = async () => {
    try {
      const f = $('#file').files[0];
      if (!f) throw new Error('choose a file');
      let data; try { data = JSON.parse(await f.text()); } catch(_){ throw new Error('not a valid export file'); }
      await api('/api/import',{method:'POST',body:JSON.stringify(data)});
      renderVault();
    } catch(e){ $('#e').textContent = e.message; }
  };
}
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
boot();
</script></body></html>
