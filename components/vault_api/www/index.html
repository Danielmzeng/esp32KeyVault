<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>esp32key</title>
<style>
body{font-family:system-ui,sans-serif;max-width:820px;margin:2rem auto;padding:0 1rem}
input,button,select{font-size:1rem;padding:.5rem;margin:.25rem 0;width:100%;box-sizing:border-box}
.entry{border:1px solid #ccc;border-radius:6px;padding:.5rem;margin:.5rem 0}
.row{display:flex;gap:.5rem}.row button{width:auto}
.err{color:#b00}
.sec{margin-top:.4rem;font-family:ui-monospace,monospace;font-size:.9rem;word-break:break-all}
.layout{display:flex;gap:1rem;align-items:flex-start}
.side{width:170px;flex:none}
.main{flex:1;min-width:0}
.logo{width:100%;max-width:128px;display:block;margin:0 auto .5rem}
.cat{display:flex;justify-content:space-between;align-items:center;padding:.4rem .5rem;border-radius:5px;cursor:pointer}
.cat:hover{background:#f0f0f0}
.cat.on{background:#e3e3e3;font-weight:600}
.cat .x{color:#b00;cursor:pointer;padding:0 .25rem;font-weight:400}
.addcat{display:flex;gap:.3rem;margin-top:.5rem}.addcat input{margin:0}.addcat button{width:auto;white-space:nowrap}
@media(max-width:600px){.layout{flex-direction:column}.side{width:100%}}
</style></head>
<body><div id="app">Loading…</div>
<script>
const $ = s => document.querySelector(s);
async function api(path, opts={}) {
  const r = await fetch(path, {credentials:'same-origin', headers:{'Content-Type':'application/json'}, ...opts});
  if (!r.ok) throw new Error((await r.json().catch(()=>({}))).error || r.statusText);
  return r.status === 204 ? null : r.json();
}
async function boot() {
  const st = await api('/api/state');
  if (!st.initialized) return renderSetup();
  if (!st.unlocked) return renderLogin();
  return renderVault();
}
function renderSetup() {
  $('#app').innerHTML = `<h2>Set up vault</h2>
    <input id=pw type=password placeholder="Master password (daily unlock)">
    <input id=tpw type=password placeholder="Transfer password (import/export)">
    <button id=go>Create vault</button><div class=err id=e></div>`;
  $('#go').onclick = async () => {
    try { await api('/api/setup',{method:'POST',body:JSON.stringify(
      {password:$('#pw').value, transfer_password:$('#tpw').value})}); boot(); }
    catch(e){ $('#e').textContent = e.message; }
  };
}
function renderLogin() {
  $('#app').innerHTML = `<h2>Unlock</h2>
    <input id=pw type=password placeholder="Master password">
    <button id=go>Unlock</button><div class=err id=e></div>`;
  $('#go').onclick = async () => {
    try { await api('/api/login',{method:'POST',body:JSON.stringify({password:$('#pw').value})}); boot(); }
    catch(e){ $('#e').textContent = e.message; }
  };
}

/* ---- vault with category sidebar ---- */
let cats = [], entries = [], sel = 'all';
const catName = id => id === 0 ? 'Uncategorized' : (cats.find(c=>c.id===id)?.name ?? 'Uncategorized');

async function renderVault() {
  entries = (await api('/api/entries')).entries || [];
  cats    = (await api('/api/categories')).categories || [];
  paint();
}

function paint() {
  const sideItems = [{k:'all',n:'All'},{k:0,n:'Uncategorized'},
                     ...cats.map(c=>({k:c.id,n:c.name,del:true}))];
  const side = sideItems.map(it=>`<div class="cat${sel===it.k?' on':''}" data-k="${it.k}">
      <span class=cn>${esc(it.n)}</span>${it.del?`<span class=x data-del="${it.k}">×</span>`:''}</div>`).join('');

  const shown = entries.filter(e => sel==='all' ? true : e.category===sel);
  const list = shown.map(e=>`<div class=entry data-id=${e.id}>
      <b>${esc(e.title)}</b> — ${esc(e.username)} <small>[${esc(catName(e.category))}]</small>
      <div class=row><button class=rev>Reveal</button><button class=del>Delete</button></div>
      <div class=sec></div></div>`).join('') || '<p>No entries.</p>';

  const opts = [`<option value=0>Uncategorized</option>`,
                ...cats.map(c=>`<option value=${c.id}>${esc(c.name)}</option>`)].join('');

  $('#app').innerHTML = `<div class=layout>
    <div class=side>
      <img class=logo src="/vault.png" alt="esp32key">
      <div id=catlist>${side}</div>
      <div class=addcat><input id=newcat placeholder="New category" maxlength=31>
        <button id=addcat>+ Add</button></div>
      <div class=err id=ce></div>
      <div class=row style="margin-top:.6rem"><button id=xfer>Transfer</button>
        <button id=lock>Lock</button></div>
    </div>
    <div class=main>
      <h2>${sel==='all'?'All entries':esc(catName(sel))}</h2>
      <div id=list>${list}</div>
      <h3>Add entry</h3>
      <select id=ecat>${opts}</select>
      <input id=t placeholder=Title><input id=u placeholder=Username>
      <input id=eurl placeholder=URL><input id=s placeholder=Secret>
      <input id=ecmt placeholder=Comment>
      <button id=add>Add</button><div class=err id=e></div>
    </div></div>`;

  if (sel!=='all') $('#ecat').value = String(sel);

  document.querySelectorAll('.cat').forEach(c=>c.onclick=ev=>{
    if (ev.target.classList.contains('x')) return;       /* handled below */
    const k = c.dataset.k; sel = k==='all' ? 'all' : Number(k); paint();
  });
  document.querySelectorAll('.cat .x').forEach(x=>x.onclick=async ev=>{
    ev.stopPropagation();
    if (!confirm('Delete this category? Its entries move to Uncategorized.')) return;
    try { await api(`/api/categories/${x.dataset.del}`,{method:'DELETE'});
      if (sel===Number(x.dataset.del)) sel='all'; renderVault(); }
    catch(e){ $('#ce').textContent = e.message; }
  });
  $('#addcat').onclick = async () => {
    const name = $('#newcat').value.trim();
    if (!name) return;
    try { await api('/api/categories',{method:'POST',body:JSON.stringify({name})}); renderVault(); }
    catch(e){ $('#ce').textContent = e.message; }
  };
  document.querySelectorAll('.rev').forEach(b=>b.onclick=async ev=>{
    const d=ev.target.closest('.entry');
    try { const {secret,url,comment}=await api(`/api/entries/${d.dataset.id}/secret`);
      d.querySelector('.sec').innerHTML =
        `<div><b>URL:</b> ${esc(url)||'—'}</div>`+
        `<div><b>Secret:</b> ${esc(secret)||'—'}</div>`+
        `<div><b>Comment:</b> ${esc(comment)||'—'}</div>`; }
    catch(e){ d.querySelector('.sec').textContent = e.message; }
  });
  document.querySelectorAll('.del').forEach(b=>b.onclick=async ev=>{
    const d=ev.target.closest('.entry'); await api(`/api/entries/${d.dataset.id}`,{method:'DELETE'}); renderVault();
  });
  $('#add').onclick = async () => {
    try { await api('/api/entries',{method:'POST',body:JSON.stringify(
      {title:$('#t').value, username:$('#u').value, secret:$('#s').value,
       url:$('#eurl').value, comment:$('#ecmt').value, category:Number($('#ecat').value)})});
      renderVault(); }
    catch(e){ $('#e').textContent = e.message; }
  };
  $('#xfer').onclick = renderTransfer;
  $('#lock').onclick = async()=>{ try{ await api('/api/logout',{method:'POST'}); }catch(e){} boot(); };
}

function renderTransfer() {
  $('#app').innerHTML = `<h2>Transfer</h2>
    <h3>Export</h3>
    <input id=epw type=password placeholder="Transfer password">
    <button id=exp>Download export file</button>
    <h3>Import</h3>
    <input id=ipw type=password placeholder="Transfer password (of the file)">
    <input id=file type=file>
    <button id=imp>Import file</button>
    <div class=row><button id=back>Back</button></div>
    <div class=err id=e></div>`;
  $('#back').onclick = renderVault;
  $('#exp').onclick = async () => {
    try {
      const r = await fetch('/api/export', {method:'POST', credentials:'same-origin',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({transfer_password:$('#epw').value})});
      if (!r.ok) throw new Error((await r.json().catch(()=>({}))).error || r.statusText);
      const blob = await r.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = 'esp32key-export.bin'; a.click();
      URL.revokeObjectURL(a.href);
    } catch(e){ $('#e').textContent = e.message; }
  };
  $('#imp').onclick = async () => {
    try {
      const f = $('#file').files[0];
      if (!f) throw new Error('choose a file');
      const buf = new Uint8Array(await f.arrayBuffer());
      let bin = ''; buf.forEach(b => bin += String.fromCharCode(b));
      const b64 = btoa(bin);
      await api('/api/import',{method:'POST',body:JSON.stringify(
        {transfer_password:$('#ipw').value, bundle:b64})});
      renderVault();
    } catch(e){ $('#e').textContent = e.message; }
  };
}
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
boot();
</script></body></html>
